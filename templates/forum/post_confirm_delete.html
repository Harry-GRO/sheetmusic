{% extends 'base.html' %}
{% block title %}Delete Post — SheetShare{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
        <i class="bi bi-trash display-3 text-danger mb-3 d-block"></i>
        <h3>Delete this post?</h3>
        <p class="text-muted mb-4">
            <strong>"{{ post.title }}"</strong> will be permanently deleted along with all its comments and files. This cannot be undone.
        </p>
        <form method="POST" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger me-2">Yes, delete it</button>
        </form>
        <a href="{% url 'post_detail' post.pk %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
</div>
{% endblock %}
